name: News Daily Summary

on:
  schedule:
    - cron: "0 14 * * *"   # UTC 14:00 = 台北時間 22:00
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily summary script
        run: python push_daily_summary.py

      - name: Commit updated state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_log.json
          git diff --staged --quiet || git commit -m "Update daily_log.json after summary [skip ci]"
          git push
