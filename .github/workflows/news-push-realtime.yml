name: News Push Realtime

on:
  schedule:
    - cron: "*/30 * * * *"   # 每 30 分鐘檢查一次(靜音時段由腳本自行判斷跳過)
  workflow_dispatch: {}

permissions:
  contents: write   # 需要寫入權限，才能把 sent_links.json / daily_log.json 的更新推回 repo

jobs:
  push-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run realtime push script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python push_realtime.py

      - name: Commit updated state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_links.json daily_log.json
          git diff --staged --quiet || git commit -m "Update state files [skip ci]"
          git push
